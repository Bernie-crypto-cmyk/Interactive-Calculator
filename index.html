<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content=" Interactive Calculator ">
<link rel="stylesheet" href="style.css">
<title>Calculator</title>
</head>
<body>
<div id="display"></div>
<div class="container">
<div class="container-numbers">
<button class="num-btn">1</button>
<button class="num-btn">2</button>
<button class="num-btn">3</button>
<button class="num-btn">4</button>
<button class="num-btn">5</button>
<button class="num-btn">6</button>
<button class="num-btn">7</button>
<button class="num-btn">8</button>
<button class="num-btn">9</button>
<button class="num-btn">0</button>
<button class="num-btn">.</button>
</div>

<div class="container-operations">
<button id="backspace">Del</button>
<button id="clear" >AC</button>
<button id="add" class="num-btn">+</button>
<button id="minus" class="num-btn">-</button>
<button id="multiply" class="num-btn">×</button>
<button id="divide" class="num-btn">÷</button>
<button id="answer">=</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
